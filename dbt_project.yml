name: 'bank_customer_360'
version: '1.0.0'
config-version: 2

profile: 'bank_customer_360'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]
docs-paths: ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  active_customer_window_days: 90
  hibernate_window_days: 180
  churn_window_days: 365

  # Value-tier thresholds. Private > Priority.
  private_customer_min_txn_value:  100000
  priority_customer_min_txn_value: 50000

  # Reporting anchor date. Null -> current_date().
  report_date: "2025-07-01"

  # Per-table backfill watermarks. Null -> use MAX from the table.
  backfill_transaction_date: null
  backfill_interaction_date: null
  backfill_enrollment_date:  null

seeds:
  bank_customer_360:
    +schema: raw
    +quote_columns: false
    +file_format: delta
    +delimiter: "|"
    customer_raw:
      +column_types:
        customer_id: bigint
        first_name: string
        last_name: string
        email: string
        mobile: string
        gender: string
        date_of_birth: date
        signup_date: date
    product_enrollments:
      +column_types:
        product_id: bigint
        customer_id: bigint
        product_type: string
        enrollment_date: date
        limit: double
    crm_interactions:
      +column_types:
        interaction_id: bigint
        customer_id: bigint
        interaction_type: string
        interaction_date: date
    transaction_history:
      +column_types:
        product_id: bigint
        customer_id: bigint
        transaction_amount: double
        closing_balance: double
        transaction_date: timestamp
        transaction_id: bigint

models:
  bank_customer_360:
    bronze:
      +materialized: incremental
      +file_format: delta
      +incremental_strategy: append      
      +on_schema_change: append_new_columns
      +schema: bronze
    silver:
      +materialized: incremental
      +file_format: delta
      +incremental_strategy: merge
      +on_schema_change: append_new_columns
      +schema: silver
    gold:
      +materialized: table
      +file_format: delta
      +schema: gold
      customer_360:
        +materialized: table
        +partition_by: ['customer_segment']
        +tblproperties:
          delta.autoOptimize.optimizeWrite: 'true'
          delta.autoOptimize.autoCompact: 'true'
